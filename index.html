<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MICROJOY PRO</title>

<style>
:root {
    --bg:#050505;
    --accent:#ff1a40;
}
body {
    margin:0;
    background:var(--bg);
    color:white;
    font-family:monospace;
    text-align:center;
}
.header {
    padding:10px;
    border-bottom:1px solid #222;
}
button {
    background:black;
    color:var(--accent);
    border:1px solid var(--accent);
    padding:8px;
    margin:5px;
}
#menuPanel {
    position:fixed;
    bottom:80px;
    right:20px;
    background:#111;
    padding:10px;
    display:none;
}
</style>
</head>

<body>

<div class="header">
    MICROJOY PRO
    <button id="btnConnect">CONNECT</button>
    <span id="status">OFFLINE</span>
</div>

<div>
    <h2 id="telemetry">X+00,Y+00</h2>
</div>

<!-- JOYSTICK -->
<div id="joystick" style="margin-top:50px;">
    <button onclick="setMove(0,90)">↑</button><br>
    <button onclick="setMove(-90,0)">←</button>
    <button onclick="setMove(0,0)">■</button>
    <button onclick="setMove(90,0)">→</button><br>
    <button onclick="setMove(0,-90)">↓</button>
</div>

<!-- MENU -->
<button id="btnMenu">☰</button>

<div id="menuPanel">
    <button data-mode="touch">Touch</button><br>
    <button data-mode="keyboard">Keyboard</button>
</div>

<script>

// ================= BLE =================
const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const UART_RX_CHARACTERISTIC_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

let bleDevice, rxChar, connected=false;

const statusEl = document.getElementById("status");

document.getElementById("btnConnect").onclick = async () => {
    try {
        bleDevice = await navigator.bluetooth.requestDevice({
            filters:[{namePrefix:"BBC"},{namePrefix:"micro:bit"}],
            optionalServices:[UART_SERVICE_UUID]
        });

        const server = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(UART_SERVICE_UUID);
        rxChar = await service.getCharacteristic(UART_RX_CHARACTERISTIC_UUID);

        connected=true;
        statusEl.innerText="ONLINE";
    } catch(e){ console.log(e); }
};

function send(msg){
    if(!connected) return;
    rxChar.writeValue(new TextEncoder().encode(msg));
}

// ================= CONTROL =================
let cX=0,cY=0;

function setMove(x,y){
    if(controlMode!=="touch") return;
    cX=x; cY=y;
    update();
}

function update(){
    let msg=`X${format(cX)},Y${format(cY)}\n`;
    document.getElementById("telemetry").innerText=msg;
    send(msg);
}

function format(v){
    return (v>=0?"+":"-")+Math.abs(v).toString().padStart(2,"0");
}

// ================= MENU =================
let controlMode="touch";

const menu = document.getElementById("menuPanel");

document.getElementById("btnMenu").onclick=()=>{
    menu.style.display = menu.style.display==="none"?"block":"none";
};

document.querySelectorAll("#menuPanel button").forEach(btn=>{
    btn.onclick=()=>{
        controlMode=btn.dataset.mode;
        menu.style.display="none";
        alert("Mode: "+controlMode);
    };
});

// ================= KEYBOARD =================
let keyState={};

window.addEventListener("keydown",(e)=>{
    if(controlMode!=="keyboard") return;

    if(e.key==="w"||e.key==="ArrowUp") keyState.up=true;
    if(e.key==="s"||e.key==="ArrowDown") keyState.down=true;
    if(e.key==="a"||e.key==="ArrowLeft") keyState.left=true;
    if(e.key==="d"||e.key==="ArrowRight") keyState.right=true;

    applyKeys();
});

window.addEventListener("keyup",(e)=>{
    if(controlMode!=="keyboard") return;

    if(e.key==="w"||e.key==="ArrowUp") keyState.up=false;
    if(e.key==="s"||e.key==="ArrowDown") keyState.down=false;
    if(e.key==="a"||e.key==="ArrowLeft") keyState.left=false;
    if(e.key==="d"||e.key==="ArrowRight") keyState.right=false;

    applyKeys();
});

function applyKeys(){
    cX=0; cY=0;

    if(keyState.up) cY=90;
    if(keyState.down) cY=-90;
    if(keyState.left) cX=-90;
    if(keyState.right) cX=90;

    update();
}

</script>

</body>
</html>
